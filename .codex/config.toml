# PStream Android — Codex CLI Configuration
# Project: Flutter Android port of xp-technologies-dev/p-stream
# Secrets live in: .codex\.env (never commit that file)

experimental_use_rmcp_client = true
suppress_unstable_features_warning = true

# ── 1. DART / FLUTTER ────────────────────────────────────────────────────────
# Primary workhorse. All Flutter/Dart codegen, formatting, device listing.
# SETUP: Already works if Flutter SDK is installed and `dart` is on PATH.
[mcp_servers.dart-mcp-server]
command = "dart"
args = ["mcp-server"]

[mcp_servers.dart-mcp-server.tools.add_roots]
approval_mode = "approve"

[mcp_servers.dart-mcp-server.tools.dart_format]
approval_mode = "approve"

[mcp_servers.dart-mcp-server.tools.list_devices]
approval_mode = "approve"

# ── 2. GITHUB ─────────────────────────────────────────────────────────────────
# Fetches raw source from xp-technologies-dev/p-stream (the design reference).
# Also creates repos, branches, PRs, issues. Uses Diksha's PAT (repo owner).
# SETUP: npm install -g @modelcontextprotocol/server-github
# KEY:   Add GITHUB_PAT_DIKSHA=ghp_xxx to .codex\.env
#        Get at: github.com → Settings → Developer Settings → Personal access tokens
#        → Fine-grained → New token → repo: Contents(read), PRs(write), Issues(write)
[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 60

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PAT_DIKSHA}"

[mcp_servers.github.tools.create_repository]
approval_mode = "approve"

# ── 3. CODE REVIEW GRAPH ──────────────────────────────────────────────────────
# Builds a dependency graph of the local Flutter project.
# get_minimal_context_tool loads ONLY the files relevant to your current task.
# Saves massive tokens on large codebases. Run before every review session.
# SETUP: pip install code-review-graph
#        Then once per project: cd <project-root> && code-review-graph init
# NO KEY needed — reads local filesystem only.
[mcp_servers.code-review-graph]
command = "code-review-graph"
args = ["serve"]

[mcp_servers.code-review-graph.tools.get_minimal_context_tool]
approval_mode = "approve"

# ── 4. STITCH (Google) ────────────────────────────────────────────────────────
# Generates Flutter widgets from a component description or screenshot.
# Use when porting a complex P-Stream component (LightBar, ScrapeCard, etc).
# SETUP: No install needed (uses npx + remote).
# KEY:   Add GOOGLE_API_KEY=AIza... to .codex\.env
#        Get at: console.cloud.google.com → APIs & Services → Credentials
#        → Create Credentials → API Key
#        → Enable "Vertex AI API" in the same project
[mcp_servers.StitchMCP]
command = "npx"
args = ["-y", "mcp-remote", "https://stitch.googleapis.com/mcp", "--header", "X-Goog-Api-Key: ${GOOGLE_API_KEY}"]
startup_timeout_sec = 120

# ── 5. FIGMA ──────────────────────────────────────────────────────────────────
# Optional. Use when you need a mockup reference before coding.
# Not required for this project — we translate from P-Stream source directly.
# SETUP: No install needed.
# KEY:   Not required for read-only access via MCP URL.
#        If you need write/export: figma.com → Account Settings → Access Tokens
#        Add FIGMA_ACCESS_TOKEN=figd_... to .codex\.env if needed.
[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

# ── REMOVED ───────────────────────────────────────────────────────────────────
# cloudrun        — everything on Oracle VM, no Cloud Run needed
# firebase        — local-only app, no analytics/backend in scope
# linear          — 2-person team, GitHub Issues is enough
