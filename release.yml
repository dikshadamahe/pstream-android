name: Build & Release APK
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=ORACLE_URL=${{ secrets.ORACLE_URL }} \
            --dart-define=TMDB_TOKEN=${{ secrets.TMDB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "PStream Android ${{ github.ref_name }}"
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Install Instructions
            1. Download `app-release.apk` below
            2. On Android: Settings → Security → Allow install from unknown sources
            3. Install the APK

            ## What's in this release
            See commit history for changes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
